name: Gmail to Kindle

on:
  schedule:
    - cron: "0 18 * * 1,4" # Monday & Thursday at 18:00 UTC (evening CET)
  workflow_dispatch:
    inputs:
      since_days:
        description: "Days of history to include"
        required: false
        default: "4"
      label:
        description: "Gmail label to fetch"
        required: false
        default: "newsletters"

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    env:
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      GAPPPWD: ${{ secrets.GAPPPWD }}
      SINCE_DAYS: ${{ inputs.since_days || '4' }}
      LABEL: ${{ inputs.label || 'newsletters' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Fetch Gmail and export EPUB
        id: export
        run: |
          uv run python -m unhook.cmd gmail-to-kindle \
            --since-days "$SINCE_DAYS" \
            --label "$LABEL" \
            --output-dir "exports" \
            --file-prefix "newsletters"

          # Check if any EPUB was created
          if ls exports/*.epub 1> /dev/null 2>&1; then
            echo "epub_created=true" >> $GITHUB_OUTPUT
          else
            echo "epub_created=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate EPUB has no remote embedded images
        if: steps.export.outputs.epub_created == 'true'
        run: |
          epub_path="$(ls -t exports/*.epub | head -n 1)"
          echo "Validating $epub_path"
          tmpdir="$(mktemp -d)"
          unzip -q "$epub_path" -d "$tmpdir"
          python - <<'PY' "$tmpdir/EPUB"
          import pathlib
          import re
          import sys

          epub_dir = pathlib.Path(sys.argv[1])
          pattern = re.compile(
              r"<img\b[^>]*\bsrc\s*=\s*(?:[\"']https?://[^\"']+[\"']|https?://[^\s>]+)",
              re.IGNORECASE,
          )
          violations = []

          for xhtml_path in sorted(epub_dir.glob("*.xhtml")):
              text = xhtml_path.read_text(encoding="utf-8", errors="ignore")
              for lineno, line in enumerate(text.splitlines(), start=1):
                  if pattern.search(line):
                      violations.append((xhtml_path.name, lineno, line.strip()))

          if violations:
              print("Found remote embedded image src in EPUB XHTML:")
              for file_name, lineno, line in violations:
                  print(f"{file_name}:{lineno}: {line}")
              raise SystemExit(1)

          print("No remote embedded image sources found.")
          PY

      - name: Send EPUB via email
        if: steps.export.outputs.epub_created == 'true'
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.GAPPPWD }}
          secure: false
          subject: "Newsletter digest"
          to: ${{ secrets.AMAZON_KINDLE_ADDRESS }}
          from: "Github actions <${{ secrets.SMTP_USERNAME }}>"
          body: "Automated newsletter EPUB export."
          attachments: "exports/*.epub"

      - name: Log no emails found
        if: steps.export.outputs.epub_created == 'false'
        run: echo "No emails found matching criteria. Skipping send."
